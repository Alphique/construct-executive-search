<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        input {
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<h2>Login</h2>

<form method="POST">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

</body>
</html>
